<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            border-collapse: collapse;
            width: 100%;
        }
        header {
            padding: 0.5em;
            text-align: center;
        }
        header h1{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 2.5em;
            padding-bottom: 0.2em;
            font-weight: bolder;
            color: blueviolet;
            border-bottom: 0.2em dashed rgb(83, 25, 138) ;
        }
        body{
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            
        }
        thead tr{
            font-size: 1.3em;
            text-align: left;
            background-color: blueviolet;
            color: white;
            border-bottom: 0.2em solid rgb(83, 25, 138);
            font-weight: bold;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
        th, td {
            border: 0.1em solid rgb(83, 25, 138) ;
            padding: 0.5em
        }
        tbody tr:nth-last-of-type(odd) {
            background-color: rgba(133, 40, 219, 0.281);
        }

        form{
            width: 60%;
            display: flex;
            flex-direction: column;
            padding: 0.5em;
            background-color: rgba(133, 40, 219, 0.281);
            border: 0.1em solid rgb(83, 25, 138);
        }
        div{
            height:5em
        }
        input, textarea{
            width: 95%;
            height: 50%;
            font-size: 1.05em;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }
        label{
            font-size: 1.3em;
            font-weight: bold;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
        #buttons{
            display: flex;
            width: 95%;
            justify-content: space-around;
            
        }
        button{
            width: 25%;
            height: 50%;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            border: 0.1em solid rgb(83, 25, 138);
            background-color: blueviolet;
            color: white;
            font-size: 1.5em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>Class Schedule - Highschool and CCBC</h1>
    </header>
    <main>
        <table>
            <thead>
                <tr>
                    <th>Course Name</th>
                    <th>Course ID</th>
                    <th>Professor Name</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Web Standards</td>
                    <td>CSIT121</td>
                    <td>Veronica Noone</td>
                </tr>
                <tr>
                    <td>Physics IB</td>
                    <td>PHYSIB1</td>
                    <td>Prajwal Panda</td>
                </tr>
                <tr>
                    <td>Computer Science IB </td>
                    <td>CSIB1</td>
                    <td>Jake Lee</td>
                </tr>
                <tr>
                    <td>Psychology IB</td>
                    <td>PSYCHIB1</td>
                    <td>Jason Schmidt</td>
                </tr>
            </tbody>
        </table>
        <br>
        <form>
            <div>
                <label for="Name"> Name:</label>
                <br>
                <input type="Name" id="Name" name="Name" placeholder="Enter First and Last Name" required>
            </div>

            <br>

            <div>
                <label for="email">Email: </label>
                <br>
                <input type="email" id="email" name="email" placeholder="Enter Email Address" required>
            </div>

            <br>

            <div>
                <label for="feedback">Feedback: </label>
                <br>
                <textarea type="feedback" id="feedback" name="feedback" placeholder="Enter your feedback!" rows="3" maxlength="1600" required></textarea>
            </div>
            <br>
            <div id="buttons">
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </div>
        </form>
    </main>
</body>
</html>
