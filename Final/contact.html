    <header>
        <h1>Contact Me!</h1>
    </header>
    <main class="lab7Main">
        <form aria-label="Contact Form">
            <div>
                <label for="Name"> Name:</label>
                <br>
                <input type="text" id="Name" name="Name" placeholder="Enter First and Last Name"  aria-required="true">
            </div>

            <br>

            <div>
                <label for="email">Email: </label>
                <br>
                <input type="text" id="email" name="email" placeholder="Enter Email Address" aria-required="true">
            </div>
            <br>
            <div>
                <label for="submission-date">Select today's date: </label>
                <br>
                <input type="date" id="submission-date" name="submission-date" aria-required="true">
            </div>

            <br>

            <div>
                <label for="albums">Which albums do you think you'll listen to?</label>
                <br>
                <select id="albums" name="albums" multiple>
                    <option value="I_AM">-I Am by Lexa Gates</option>
                    <option value="FeReturn">-Feline's Return by Natanya</option>
                    <option value="Tele">-Telefone by Noname</option>
                    <option value="GapYr">-Gap Year by Laila</option>
                    <option value="RUDown">-Are You Down? by Spencer</option>
                    <option value="none">-None</option>
                </select>
                <br>
                <p>*hold down CTRL and select all albums that apply*</p>
            </div>
            
            <br>
            <div>
                <label for="reqs">What album(s) should I listen to next?</label>
                <br>
                <input type="text" id="reqs" name="reqs" placeholder="Enter Album Name and Artist">
            </div>
            <br>
            <div>
                <label for="comment">Additional Comments: </label>
                <br>
                <textarea id="comment" name="comment" placeholder="Please Enter your comment!" rows="3" maxlength="1600" aria-required="true" aria-describedby="comment-hint"></textarea>
                <p id="comment-hint">Please enter your comment!</p>
            </div>
            <br>
            <div id="buttons">
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </div>
        </form>
    </main>
